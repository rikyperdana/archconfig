# Location: ~/.config/picom/picom.conf

#################################
#             Shadows           #
#################################
shadow = true;
shadow-radius = 12;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity = 0.4;
# Exclude shadows on specific elements to keep it clean
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
#           Fading              #
#################################
fading = true;
fade-in-step = 0.08;
fade-out-step = 0.08;
fade-delta = 4;

#################################
#           Corners             #
#################################
# Rounded corners give a softer, modern feel
corner-radius = 10;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

#################################
#           General             #
#################################
# Use the 'glx' backend for better performance if you have a GPU
backend = "glx";
vsync = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;

#################################
#           Opacity             #
#################################

inactive-opacity = 0.8;
active-opacity = 1.0;
inactive-opacity-override = false;

#################################
#             Blur              #
#################################

#################################
#           Blur                #
#################################

blur: {
  method = "dual_kawase";
  strength = 5;      # Adjust from 1 to 20 (5-7 is the sweet spot)
  background = true;
  background-frame = false;
  background-fixed = false;
}

# Exclude things that shouldn't be blurry (like tooltips or screenshots)
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c",
  "class_g = 'slop'"
];